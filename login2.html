<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalConnect | Authentic Kerala Experiences</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --kerala-green: #14452F;
            --kerala-accent: #27ae60;
            --white: #ffffff;
            --text-dark: #1e272e;
            --text-light: #57606f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            /* If kerala.jpg still isn't working, ensure it's in the SAME folder as this file */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('kerala.jpg'); 
            
            /* Fallback color in case the image fails to load */
            background-color: var(--kerala-green);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--kerala-green);
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-light);
            font-size: 14px;
            line-height: 1.4;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-dark);
            padding-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #dcdde1;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--kerala-green);
            box-shadow: 0 0 0 4px rgba(20, 69, 47, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--kerala-green);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(20, 69, 47, 0.3);
        }

        .login-btn:hover {
            background: #0d2e1f;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(20, 69, 47, 0.4);
        }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #bdc3c7;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
        }

        .divider span {
            padding: 0 10px;
        }

        .footer-links {
            font-size: 14px;
            color: var(--text-light);
        }

        .footer-links div {
            margin-bottom: 8px;
        }

        .footer-links a {
            color: var(--kerala-green);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <h1>LocalConnect</h1>
            <p>Experience Kerala’s authentic culture <br>on a budget.</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Username or Email</label>
                <input type="text" id="username" placeholder="Enter your details" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
        </form>

        <div class="divider"><span>New to LocalConnect?</span></div>

        <div class="footer-links">
            <div>Ready to explore? <a href="#">Create Tourist Account</a></div>
            <div>Are you a local expert? <a href="#">Register as a Guide</a></div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Visual feedback
            loginBtn.innerText = "Authenticating...";
            loginBtn.style.opacity = "0.7";
            loginBtn.disabled = true;

            // Simple redirect simulation
            setTimeout(() => {
                // You can point this to your dashboard or homepage
                window.location.href = 'dashboard.html';
            }, 1200);
        });
    </script>

</body>
</html>
