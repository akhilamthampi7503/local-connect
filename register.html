<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | LocalConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --kerala-green: #14452F;
            --kerala-hover: #0d2e1f;
            --text-main: #1a1a1a;
            --text-muted: #57606f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Using the local image background with a dark green overlay */
            background: linear-gradient(rgba(20, 69, 47, 0.7), rgba(20, 69, 47, 0.7)), 
                        url('beach.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.98);
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.6s ease-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--kerala-green);
            font-weight: 800;
            font-size: 30px;
            letter-spacing: -1px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1.5px solid #dcdde1;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            background: #ffffff;
            color: var(--text-main);
        }

        input:focus, select:focus {
            border-color: var(--kerala-green);
            box-shadow: 0 0 0 4px rgba(20, 69, 47, 0.1);
        }

        /* Styling the placeholder text */
        input::placeholder {
            color: #a0a0a0;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: var(--kerala-green);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(20, 69, 47, 0.2);
        }

        button:hover {
            background: var(--kerala-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Navigation back to login */
        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--kerala-green);
            text-decoration: none;
            font-weight: 700;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>

    <div class="container">
        <h2>Create Account</h2>

        <form id="registerForm">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>

            <select id="role" required>
                <option value="">Select Role</option>
                <option value="guide">Guide</option>
                <option value="tourist">Tourist</option>
                <option value="admin">Admin</option>
            </select>

            <button type="submit">Register Now</button>
        </form>

        <div class="login-link">
            Already a member? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById("registerForm").addEventListener("submit", function(e){
            e.preventDefault();

            let role = document.getElementById("role").value;

            if(role === "guide"){
                alert("Guide Registration Successful");
            }
            else if(role === "tourist"){
                alert("Tourist Registration Successful");
            }
            else if(role === "admin"){
                alert("Admin Registration Successful");
            }
            else{
                alert("Please select a role");
            }
        });
    </script>

</body>
</html>
